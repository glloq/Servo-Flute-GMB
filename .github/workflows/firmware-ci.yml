name: Firmware CI

on:
  push:
    branches:
      - codex/executable-verification
      - work
  pull_request:
  workflow_dispatch:

jobs:
  esp32-build:
    name: ESP32 firmware build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-ci.txt
      - name: Install PlatformIO
        run: python -m pip install --upgrade -r requirements-ci.txt
      - name: PlatformIO version
        run: python -m platformio --version
      - name: Build ESP32 firmware
        run: python -m platformio run -e esp32dev

  native-tests:
    name: PlatformIO native tests and Python audits
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-ci.txt
      - name: Install test dependencies
        run: python -m pip install --upgrade -r requirements-ci.txt
      - name: PlatformIO version
        run: python -m platformio --version
      - name: Run PlatformIO native tests
        run: python -m platformio test -e native
      - name: Run Python audit tests
        run: python -m pytest -q
