[platformio]
default_envs = esp32dev
src_dir = Servo_flute_ESP32
test_dir = tests

[env:esp32dev]
platform = espressif32@6.10.0
board = esp32dev
framework = arduino
monitor_speed = 115200
; The host-only native test stubs live in lib/native_stubs; PlatformIO's LDF would
; otherwise pull their Arduino.h / Wire.h / Adafruit stubs into the firmware build
; and shadow the real ESP32 headers. Exclude them from the device build.
lib_ignore = native_stubs
lib_deps =
    bblanchon/ArduinoJson@7.2.1
    adafruit/Adafruit PWM Servo Driver Library@3.0.2
    adafruit/Adafruit BusIO@1.16.1
    ESP32Async/ESPAsyncWebServer@3.7.10
    ESP32Async/AsyncTCP@3.4.5
    ; The lathoub BLE-MIDI / AppleMIDI packages are not resolvable by the current
    ; PlatformIO registry under these owner/version specs, so pin them to their
    ; upstream Git tags (verified to exist). This is the source used by BleMidiHandler
    ; (hardware/BLEMIDI_ESP32_NimBLE.h) and WifiMidiHandler (AppleMIDI.h).
    https://github.com/lathoub/Arduino-BLE-MIDI.git#v2.2.0
    https://github.com/lathoub/Arduino-AppleMIDI-Library.git#v3.2.0
    ; Arduino-BLE-MIDI v2.2.0 (library.properties) declares "depends=...,
    ; NimBLE-Arduino, ..." with no version, so PlatformIO would pull the latest
    ; NimBLE-Arduino (2.5.x). The wrapper the firmware includes
    ; (<hardware/BLEMIDI_ESP32_NimBLE.h>) uses the NimBLE 1.x API (NimBLESecurity,
    ; ESP_LE_AUTH_BOND) which 2.x removed, so it only compiles against 1.4.x.
    ; Pinning NimBLE via its Git tag installs it under the folder name
    ; "NimBLE-Arduino", which exactly matches the un-owned name in that depends
    ; list; PlatformIO then reuses this single copy for the transitive dependency
    ; instead of installing a second (2.5.x) tree. An owner-qualified registry
    ; spec (h2zero/NimBLE-Arduino) does NOT match the un-owned depends name and
    ; produced two copies -> "multiple definition of NimBLE*" link errors.
    https://github.com/h2zero/NimBLE-Arduino.git#1.4.3
build_flags =
    -std=gnu++17

[env:native]
platform = native
lib_extra_dirs = lib
lib_deps =
    native_stubs
test_framework = custom
build_src_filter =
    +<PressureController.cpp>
    +<EventQueue.cpp>
    +<FingerController.cpp>
    +<AirflowController.cpp>
    +<FanController.cpp>
    +<NoteSequencer.cpp>
    +<ConfigValidator.cpp>
    +<InstrumentManager.cpp>
    +<CalibrationAirSupply.cpp>
    +<AutoCalibrator.cpp>
    +<PitchDetector.cpp>
    -<Servo_flute_ESP32.ino>
    -<ConfigStorage.cpp>
build_flags =
    -std=c++17
    -DUNIT_TEST
    -I lib/native_stubs/include
    -I Servo_flute_ESP32
test_build_src = yes
