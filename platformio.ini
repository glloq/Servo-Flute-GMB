[platformio]
default_envs = esp32dev
src_dir = Servo_flute_ESP32
test_dir = tests

[env:esp32dev]
platform = espressif32@6.10.0
board = esp32dev
framework = arduino
monitor_speed = 115200
; The host-only native test stubs live in lib/native_stubs; PlatformIO's LDF would
; otherwise pull their Arduino.h / Wire.h / Adafruit stubs into the firmware build
; and shadow the real ESP32 headers. Exclude them from the device build.
lib_ignore = native_stubs
lib_deps =
    bblanchon/ArduinoJson@7.2.1
    adafruit/Adafruit PWM Servo Driver Library@3.0.2
    adafruit/Adafruit BusIO@1.16.1
    ESP32Async/ESPAsyncWebServer@3.7.10
    ESP32Async/AsyncTCP@3.4.5
    ; BLE-MIDI is VENDORED in lib/Arduino-BLE-MIDI (lathoub v2.2.0, the source of
    ; BleMidiHandler's <hardware/BLEMIDI_ESP32_NimBLE.h>). Upstream's
    ; library.properties declares an un-owned "depends=NimBLE-Arduino" with no
    ; version; whatever way NimBLE is pinned here (owner-qualified, Git, or bare),
    ; the pin lands in a differently named libdeps folder than that un-owned
    ; transitive entry, so PlatformIO installs a SECOND NimBLE tree and both link
    ; -> "multiple definition of NimBLE*". NimBLE 2.x would also break the v2.2.0
    ; wrapper (it drops NimBLESecurity/ESP_LE_AUTH_BOND and needs Arduino-ESP32
    ; 3.x). Vendoring the wrapper with a library.json that omits the NimBLE and
    ; ArduinoBLE depends lets us pin NimBLE 1.4.3 exactly once, below, as the
    ; single copy the wrapper compiles and links against.
    h2zero/NimBLE-Arduino@1.4.3
    ; AppleMIDI (WifiMidiHandler's AppleMIDI.h) is not resolvable under the old
    ; registry spec, so pin it to its upstream Git tag.
    https://github.com/lathoub/Arduino-AppleMIDI-Library.git#v3.2.0
build_flags =
    -std=gnu++17

[env:native]
platform = native
lib_extra_dirs = lib
; The vendored ESP32/Arduino BLE-MIDI wrapper is not part of the host tests and
; must not be scanned (it would try to resolve its MIDI Library dependency).
lib_ignore = Arduino-BLE-MIDI
lib_deps =
    native_stubs
test_framework = custom
build_src_filter =
    +<PressureController.cpp>
    +<EventQueue.cpp>
    +<FingerController.cpp>
    +<AirflowController.cpp>
    +<FanController.cpp>
    +<NoteSequencer.cpp>
    +<ConfigValidator.cpp>
    +<InstrumentManager.cpp>
    +<CalibrationAirSupply.cpp>
    +<AutoCalibrator.cpp>
    +<PitchDetector.cpp>
    -<Servo_flute_ESP32.ino>
    -<ConfigStorage.cpp>
build_flags =
    -std=c++17
    -DUNIT_TEST
    -I lib/native_stubs/include
    -I Servo_flute_ESP32
test_build_src = yes
