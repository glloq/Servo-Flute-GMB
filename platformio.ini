[platformio]
default_envs = esp32dev
src_dir = Servo_flute_ESP32
test_dir = tests

[env:esp32dev]
platform = espressif32@6.10.0
board = esp32dev
framework = arduino
monitor_speed = 115200
lib_deps =
    bblanchon/ArduinoJson@7.2.1
    adafruit/Adafruit PWM Servo Driver Library@3.0.2
    adafruit/Adafruit BusIO@1.16.1
    ESP32Async/ESPAsyncWebServer@3.7.10
    ESP32Async/AsyncTCP@3.4.5
    lathoub/Arduino-BLE-MIDI@2.2.0
    lathoub/AppleMIDI@3.3.0
    h2zero/NimBLE-Arduino@1.4.3
build_flags =
    -std=gnu++17

[env:native]
platform = native
test_framework = custom
build_src_filter =
    +<PressureController.cpp>
    +<EventQueue.cpp>
    +<FingerController.cpp>
    +<AirflowController.cpp>
    +<FanController.cpp>
    +<NoteSequencer.cpp>
    +<ConfigValidator.cpp>
    -<Servo_flute_ESP32.ino>
    -<ConfigStorage.cpp>
build_flags =
    -std=c++17
    -DUNIT_TEST
    -I native_test/include
    -I Servo_flute_ESP32
test_build_src = yes
