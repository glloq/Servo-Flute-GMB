[platformio]
default_envs = esp32dev
src_dir = Servo_flute_ESP32
test_dir = tests

[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
lib_deps =
    bblanchon/ArduinoJson@^7.0.0
    adafruit/Adafruit PWM Servo Driver Library@^3.0.2
    adafruit/Adafruit BusIO@^1.16.1
build_flags =
    -std=gnu++17

[env:native]
platform = native
test_framework = custom
build_flags =
    -std=c++17
    -DUNIT_TEST
    -I native_test/include
    -I Servo_flute_ESP32
test_build_src = no
