[platformio]
default_envs = esp32dev
src_dir = Servo_flute_ESP32
test_dir = tests

[env:esp32dev]
platform = espressif32@6.10.0
board = esp32dev
framework = arduino
monitor_speed = 115200
; The host-only native test stubs live in lib/native_stubs; PlatformIO's LDF would
; otherwise pull their Arduino.h / Wire.h / Adafruit stubs into the firmware build
; and shadow the real ESP32 headers. Exclude them from the device build.
lib_ignore = native_stubs
lib_deps =
    bblanchon/ArduinoJson@7.2.1
    adafruit/Adafruit PWM Servo Driver Library@3.0.2
    adafruit/Adafruit BusIO@1.16.1
    ESP32Async/ESPAsyncWebServer@3.7.10
    ESP32Async/AsyncTCP@3.4.5
    ; The lathoub BLE-MIDI / AppleMIDI packages are not resolvable by the current
    ; PlatformIO registry under these owner/version specs, so pin them to their
    ; upstream Git tags (verified to exist). This is the source used by BleMidiHandler
    ; (hardware/BLEMIDI_ESP32_NimBLE.h) and WifiMidiHandler (AppleMIDI.h).
    https://github.com/lathoub/Arduino-BLE-MIDI.git#v2.2.0
    https://github.com/lathoub/Arduino-AppleMIDI-Library.git#v3.2.0
    ; NimBLE is a transitive dependency of Arduino-BLE-MIDI: the wrapper the
    ; firmware includes (<hardware/BLEMIDI_ESP32_NimBLE.h>) ships inside that
    ; library and is written against the exact NimBLE version its library.json
    ; declares. Do NOT pin NimBLE-Arduino here as well: a second, differently
    ; versioned copy would be installed alongside the transitive one and both
    ; get linked, producing "multiple definition of NimBLE*" link errors.
    ; Letting Arduino-BLE-MIDI own its NimBLE dependency guarantees a single,
    ; self-consistent copy.
build_flags =
    -std=gnu++17

[env:native]
platform = native
lib_extra_dirs = lib
lib_deps =
    native_stubs
test_framework = custom
build_src_filter =
    +<PressureController.cpp>
    +<EventQueue.cpp>
    +<FingerController.cpp>
    +<AirflowController.cpp>
    +<FanController.cpp>
    +<NoteSequencer.cpp>
    +<ConfigValidator.cpp>
    +<InstrumentManager.cpp>
    +<AutoCalibrator.cpp>
    +<PitchDetector.cpp>
    -<Servo_flute_ESP32.ino>
    -<ConfigStorage.cpp>
build_flags =
    -std=c++17
    -DUNIT_TEST
    -I lib/native_stubs/include
    -I Servo_flute_ESP32
test_build_src = yes
